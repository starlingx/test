apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: restored-pvc-cephfs
spec:
  storageClassName: cephfs
  dataSource:
    name: cephfs-pvc-snapshot
    kind: VolumeSnapshot
    apiGroup: snapshot.storage.k8s.io
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
