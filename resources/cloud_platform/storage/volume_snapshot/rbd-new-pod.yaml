apiVersion: v1
kind: Pod
metadata:
  name: csi-rbd-demo-pod2
spec:
  containers:
    - name: web-server
      image: docker.io/library/nginx:latest
      volumeMounts:
        - name: mypvc
          mountPath: /data
  volumes:
    - name: mypvc
      persistentVolumeClaim:
        claimName: restored-pvc-rbd2
        readOnly: false