apiVersion: v1
kind: Pod
metadata:
  name: dpdk-test-crypto-perf
spec:
  restartPolicy: Never
  containers:
    - name: crypto-perf
      image: intel/crypto-perf:devel
      imagePullPolicy: IfNotPresent
      command:
        - /bin/bash
        - -c
      args:
        - while true; do sleep 300000; done;
      volumeMounts:
        - name: hugepage
          mountPath: /dev/hugepages
        - name: dpdk-runtime
          mountPath: /var/run/dpdk
      resources:
        requests:
          cpu: "3"
          memory: "1Gi"
          hugepages-1Gi: "1Gi"
          qat.intel.com/generic: "4"
        limits:
          cpu: "3"
          memory: "1Gi"
          hugepages-1Gi: "1Gi"
          qat.intel.com/generic: "4"
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          add:
            - IPC_LOCK
  volumes:
    - name: dpdk-runtime
      emptyDir:
        medium: Memory
    - name: hugepage
      emptyDir:
        medium: HugePages

