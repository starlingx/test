config:
  agent:
    collection_jitter: "0s"
    debug: false
    flush_interval: "10s"
    flush_jitter: "0s"
    hostname: "$HOSTNAME"
    interval: "10s"
    logfile: ""
    metric_batch_size: 1000
    metric_buffer_limit: 10000
    omit_hostname: false
    precision: ""
    quiet: false
    round_interval: true
  inputs:
    - intel_powerstat:
        cpu_metrics:
          -
        package_metrics:
          - "current_power_consumption"
          - "current_dram_power_consumption"
          - "thermal_design_power"
          - "cpu_base_frequency"
          - "uncore_frequency"
    - intel_pmu:
        event_definitions:
          - "/etc/telegraf/events_definition.json"
        core_events:
          - events:
              - INST_RETIRED.ANY
    - linux_cpu:
        metrics: ["cpufreq"]
  outputs:
    - prometheus_client:
        listen: ":9273"