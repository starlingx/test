apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-cirros-512mi
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm-cirros-512mi
    spec:
      domain:
        devices:
          disks:
          - disk:
              bus: virtio
            name: containerdisk
        resources:
          requests:
            memory: 512Mi
      volumes:
      - containerDisk:
          image: quay.io/kubevirt/cirros-container-disk-demo
        name: containerdisk
