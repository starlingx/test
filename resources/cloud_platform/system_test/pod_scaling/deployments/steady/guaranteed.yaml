apiVersion: apps/v1
kind: Deployment
metadata:
  name: guaranteed-steady
  labels:
    app: guaranteed-steady
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guaranteed-steady
  template:
    metadata:
      labels:
        app: guaranteed-steady
    spec:
      containers:
      - name: guaranteed-steady
        image: registry.local:9001/xridge/fio:latest
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -ec
          - |
            # Allocate memory via tmpfs and hold it for the duration
            dd if=/dev/urandom of=/scratch/memfill bs=1M count=3072 2>/dev/null
            # CPU stress loop - runs indefinitely
            while true; do
              timeout 60 sh -c 'i=0; while [ $i -lt 1000000 ]; do i=$((i+1)); done'
              sleep 1
            done
        volumeMounts:
          - name: scratch-volume
            mountPath: /scratch
        resources:
          requests:
            cpu: "200m"
            memory: "2Gi"
          limits:
            cpu: "500m"
            memory: "4Gi"
        env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
      restartPolicy: Always
      imagePullSecrets:
      - name: regcred
      volumes:
        - name: scratch-volume
          emptyDir:
            medium: Memory
            sizeLimit: 3Gi
