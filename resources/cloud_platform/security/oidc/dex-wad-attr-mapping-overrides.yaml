# Template for DEX helm overrides with configurable WAD attribute mappings.
# Variables:
#   wad_server:         WAD/AD server hostname
#   bind_dn:            WAD bind DN
#   bind_pw:            WAD bind password
#   user_search_base:   baseDN for user search (e.g., CN=Users,DC=wad-1,DC=example,DC=com)
#   group_search_base:  baseDN for group search (e.g., DC=wad-1,DC=example,DC=com)
#   email_attr:         userSearch emailAttr value
#   username_attr:      userSearch usernameAttr (sAMAccountName)
#   name_attr:          userSearch nameAttr value
config:
  connectors:
    - type: ldap
      name: RemoteWAD
      id: remotewad-1
      config:
        host: '{{ wad_server }}:636'
        insecureNoSSL: false
        insecureSkipVerify: true
        bindDN: '{{ bind_dn }}'
        bindPW: '{{ bind_pw }}'
        usernamePrompt: Username
        userSearch:
          baseDN: {{ user_search_base }}
          filter: (objectClass=user)
          username: sAMAccountName
          idAttr: sAMAccountName
          emailAttr: {{ email_attr }}
          nameAttr: {{ name_attr }}
          preferredUsernameAttr: {{ username_attr }}
        groupSearch:
          baseDN: {{ group_search_base }}
          filter: (objectClass=group)
          userMatchers:
            - userAttr: DN
              groupAttr: member
          nameAttr: cn
volumeMounts:
  - mountPath: /etc/dex/tls
    name: https-tls
volumes:
  - name: https-tls
    secret:
      defaultMode: 420
      secretName: oidc-auth-apps-certificate
