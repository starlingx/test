# Template for creating the upstream IdP CA secret for OIDC with Keycloak.
# Variables:
#   keycloak_ca_cert: PEM-encoded Keycloak CA certificate (from security_config)
apiVersion: v1
kind: Secret
metadata:
  name: oidc-upstream-idp-ca
  namespace: kube-system
type: Opaque
stringData:
  upstream-ca.crt: "{{ keycloak_ca_cert }}"
