# Template for local OIDC login kubeconfig.
# Variables:
#   ca_cert_filename:    system-local-ca certificate filename
#   oam_ip:              OAM floating IP (bracketed for IPv6, raw for IPv4)
#   oidc_client_id:      Static OIDC client ID
#   oidc_client_secret:  Static OIDC client secret
apiVersion: v1
clusters:
- cluster:
    certificate-authority: {{ ca_cert_filename }}
    server: https://{{ oam_ip }}:6443
  name: kubernetes
contexts:
- context:
    cluster: kubernetes
  name: kubernetes-admin@kubernetes
current-context: kubernetes-admin@kubernetes
kind: Config
preferences: {}
users:
- user:
    exec:
      apiVersion: client.authentication.k8s.io/v1
      command: kubectl
      args:
        - oidc-login
        - get-token
        - --oidc-issuer-url=https://{{ oam_ip }}:30556/dex
        - --oidc-client-id={{ oidc_client_id }}
        - --oidc-client-secret={{ oidc_client_secret }}
        - --certificate-authority={{ ca_cert_filename }}
        - --oidc-extra-scope=openid,profile,email,groups
        - --skip-open-browser
        - --oidc-redirect-url=http://{{ oam_ip }}:8000
        - --listen-address=0.0.0.0:8000
      interactiveMode: IfAvailable
